name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: build and ship to s3
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
      S3_BUCKET: ${{ vars.S3_BUCKET }}
      CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: guard — required variables
        run: |
          : "${S3_BUCKET:?repo variable S3_BUCKET must be set (Settings → Secrets and variables → Actions → Variables)}"
          : "${CLOUDFRONT_DISTRIBUTION_ID:?repo variable CLOUDFRONT_DISTRIBUTION_ID must be set}"

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: install
        run: npm ci

      - name: build
        run: npm run build

      - name: configure aws credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # The bucket is shared with personal file-sharing content at the root.
      # We --delete only within site-owned prefixes and never at the bucket root,
      # so hotlinked media files (mp4, gif, zip, etc.) are never touched.

      - name: sync immutable assets (_app/*) with long cache
        run: |
          aws s3 sync build/_app/ "s3://${S3_BUCKET}/_app/" \
            --delete \
            --cache-control 'public, max-age=31536000, immutable'

      - name: sync site-owned directories (with delete — these prefixes are entirely ours)
        run: |
          for dir in about projects blog contact; do
            if [ -d "build/$dir" ]; then
              echo "→ syncing $dir/"
              aws s3 sync "build/$dir/" "s3://${S3_BUCKET}/$dir/" \
                --delete \
                --cache-control 'public, max-age=0, must-revalidate'
            fi
          done

      - name: overwrite root-level site files (NO delete — preserves media)
        run: |
          aws s3 cp build/index.html "s3://${S3_BUCKET}/index.html" \
            --cache-control 'public, max-age=0, must-revalidate' \
            --content-type 'text/html; charset=utf-8'
          if [ -f build/404.html ]; then
            aws s3 cp build/404.html "s3://${S3_BUCKET}/404.html" \
              --cache-control 'public, max-age=0, must-revalidate' \
              --content-type 'text/html; charset=utf-8'
          fi
          if [ -f build/favicon.svg ]; then
            aws s3 cp build/favicon.svg "s3://${S3_BUCKET}/favicon.svg" \
              --cache-control 'public, max-age=86400' \
              --content-type 'image/svg+xml'
          fi
          if [ -f build/avatar.png ]; then
            aws s3 cp build/avatar.png "s3://${S3_BUCKET}/avatar.png" \
              --cache-control 'public, max-age=86400'
          fi

      - name: invalidate cloudfront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${CLOUDFRONT_DISTRIBUTION_ID}" \
            --paths '/*'
